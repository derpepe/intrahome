<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#111126" />
      <stop offset="100%" stop-color="#050510" />
    </radialGradient>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bgGrad)" rx="120"/>
  
  <rect x="30" y="30" width="452" height="452" fill="none" stroke="#rgba(255,255,255,0.05)" stroke-width="4" rx="100"/>

  <!-- Abstract symbol: Outer rings -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ff007f" stroke-width="4" stroke-dasharray="10 30" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="#00ffff" stroke-width="3" stroke-dasharray="80 120" filter="url(#glow)"/>
  
  <!-- Abstract symbol: Inner core -->
  <polygon points="256,136 360,316 152,316" fill="none" stroke="url(#neonGlow)" stroke-width="24" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Central geometry -->
  <circle cx="256" cy="256" r="30" fill="#00ffff" filter="url(#glow)"/>
</svg>
